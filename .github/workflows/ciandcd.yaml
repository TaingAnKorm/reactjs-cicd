name: CI/CD - Build and Deploy ReactJS

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: cleo89
  IMAGE_NAME: reactjs-cicd-itp
  GITOPS_REPO: TaingAnKorm/argocd-gitops

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag from Git SHA
        id: set_tag
        run: |
          TAG="${GITHUB_SHA::8}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops-repo:
    name: Update GitOps Repo (Helm values)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Clone GitOps repository
        run: |
          git clone https://${{ secrets.GIT_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git gitops-repo

      - name: Update image tag in values.yaml
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          cd gitops-repo
          yq -i ".image.repository = \"${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}\"" reactjs-helm/values.yaml
          yq -i ".image.tag = \"$TAG\"" reactjs-helm/values.yaml
          echo "Updated image to ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG"

      - name: Commit and push changes
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          cd gitops-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add reactjs-helm/values.yaml
          git commit -m "ci: update reactjs image tag to $TAG"
          git push https://${{ secrets.GIT_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git

      - name: Clean up
        if: always()
        run: rm -rf gitops-repo